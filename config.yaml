# The Knowles Files — show configuration.
# Tunables only. The locked identity/prompts live in knowles/prompts.py.

show:
  name: "The Knowles Files"
  host: "Gregory Knowles"
  # Stage 1 only suggests stories this fresh (events/coverage within N days).
  recency_days: 7

models:
  # Free-tier friendly. Search grounding is used for find + verify.
  # If any model 404s (preview models get retired), swap to the alternative noted.
  text: "gemini-2.5-flash"               # GA, supports Google Search grounding
  # When the primary model's free DAILY quota is exhausted (429), the pipeline
  # automatically falls back through these in order — each has its own quota.
  text_fallbacks:
    - "gemini-2.0-flash"
    - "gemini-2.5-flash-lite"
    - "gemini-2.0-flash-lite"
  tts: "gemini-2.5-flash-preview-tts"    # supports the "Alnilam" voice. Alt: gemini-3.1-flash-tts-preview
  image: "gemini-2.5-flash-image"        # "Nano Banana". Alt: gemini-3.1-flash-image-preview. May need billing; Pillow fallback exists.

voice:
  name: "Alnilam"
  # Frozen director's note (Section 4 of the spec). Prepended to every TTS call.
  director_note: >-
    Read this as Gregory Knowles: a dry, wry English man in his seventies, a
    retired London black-cab driver. Unhurried and calm, with warmth underneath
    the dryness. Conversational, like telling a story to one person over a cup of
    tea. Let the short sentences land. Honour the pauses. Slightly slower than
    normal narration.

audio:
  sample_rate: 24000        # Gemini TTS outputs 24kHz mono 16-bit PCM
  # Paragraphs longer than this many characters get split for TTS robustness.
  tts_chunk_chars: 1800
  # Use only the first N seconds of the intro/outro music (with fades), not the
  # whole track. Set to a large number to use (almost) the full file.
  intro_seconds: 5
  outro_seconds: 5

video:
  width: 1920
  height: 1080
  fps: 24
  # Fallback background colour if no image is available (hex, no #).
  bg_color: "0b0d12"
  # The video is a "radio show": one persistent, dark, non-distracting image
  # for the whole episode, with the large captions dominant on top.
  #   radio  -> use assets/radio_bg.png (recommended; one fixed image every week)
  #   episode-> use this episode's thumbnail as the video visual
  #   color  -> solid bg_color
  background_mode: "radio"
  radio_bg: "radio_bg.png"
  # Darkening so captions always read. Whole frame is dimmed by scrim_global;
  # the left caption column gets caption_panel extra on top (0..1 opacity).
  scrim_global: 0.40
  caption_panel: 0.45

captions:
  # Senior-friendly: large text in a left column, Knowles + imagery on the right.
  max_chars_per_cue: 60     # shorter cues -> bigger, calmer text in the column
  min_cue_seconds: 1.2
  font_name: "DejaVu Serif"
  font_size: 56             # ASS units at 1080p; bump higher for even larger text
  panel_ratio: 0.46         # left caption column = this fraction of the width
  # Timing: "whisper" = transcribe the actual narration for true word-level sync
  # (falls back to "proportional" char-timing if faster-whisper isn't installed).
  sync: "whisper"
  whisper_model: "base.en"  # base.en is fast+accurate on CPU; "small.en" = better, slower

thumbnail:
  width: 1280
  height: 720
  # Engine: hybrid (FREE: AI scene + your real portrait composited on top) |
  #         nano_banana (Gemini image, may need billing) | pillow (no network).
  engine: "hybrid"
  # Free AI background provider model (Pollinations). "flux" or "turbo".
  pollinations_model: "flux"
  # FIXED house style line (Section 3). Only scene + title words change weekly.
  # Noir house look — consistent every week, scroll-stopping on a phone.
  style_line: >-
    film-noir cinematic still, moody and atmospheric, deep shadows, single warm
    low key light, heavy desaturation with a faint amber tint, high contrast,
    grainy, dramatic — reads clearly as a small phone thumbnail.

publish:
  privacy: "private"        # private | unlisted | public
  category_id: "27"         # Education
  tags:
    - "true crime"
    - "scams"
    - "fraud"
    - "Gregory Knowles"
    - "The Knowles Files"
  description_footer: >-
    The Knowles Files is a weekly true-story show. Every factual claim in the
    reveal is sourced. Mind how you go.
